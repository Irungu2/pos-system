{% extends "inventory/inventory_base.html" %}
{% load static %}

{% block title %}Bulk Restock Management{% endblock %}

{% block content %}
<div class="container">
    <div class="page-header">
        <h2>Bulk Restock Management</h2>
        <a href="{% url 'inventory:bulk_restock_create' %}" class="btn btn-primary">
            + New Bulk Restock
        </a>
    </div>

    <div class="filters-container">
        <div class="filter-row">
            <div class="filter-group">
                <label>Status</label>
                <select id="filter-status">
                    <option value="">All</option>
                    <option value="draft">Draft</option>
                    <option value="reviewed">Reviewed</option>
                    <option value="processing">Processing</option>
                    <option value="completed">Completed</option>
                </select>
            </div>
            <div class="filter-group">
                <label>Store</label>
                <select id="filter-store">
                    <option value="">All Stores</option>
                    <!-- Stores will be loaded via JavaScript -->
                </select>
            </div>
            <div class="filter-group">
                <label>Date Range</label>
                <input type="date" id="filter-date-from" placeholder="From">
                <input type="date" id="filter-date-to" placeholder="To" style="margin-top: 5px;">
            </div>
            <div class="filter-group">
                <button id="clear-filters" class="btn-secondary">Clear Filters</button>
            </div>
        </div>
    </div>

    <div id="restock-list-container">
        <table id="restock-list" class="data-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Store</th>
                    <th>Category</th>
                    <th>Status</th>
                    <th>Items</th>
                    <th>Total Qty Change</th>
                    <th>Total Value</th>
                    <th>Created</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="restock-list-body">
                <tr>
                    <td colspan="9" class="loading">Loading restocks...</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<!-- Loading spinner overlay -->
<div id="loading-overlay" style="display: none;">
    <div class="spinner"></div>
</div>

<script src="{% static 'js/restock/bulk_restock_list1.js' %}"></script>

<style>
.container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 20px;
}

.page-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
}

.btn-primary {
    background: #007bff;
    color: white;
    padding: 10px 20px;
    border-radius: 6px;
    text-decoration: none;
    display: inline-block;
}

.btn-primary:hover {
    background: #0056b3;
    color: white;
}

.filters-container {
    background: #f8f9fa;
    padding: 15px;
    border-radius: 8px;
    margin-bottom: 20px;
}

.filter-row {
    display: flex;
    gap: 15px;
    flex-wrap: wrap;
}

.filter-group {
    display: flex;
    flex-direction: column;
    gap: 5px;
}

.filter-group label {
    font-size: 12px;
    font-weight: bold;
}

.filter-group select,
.filter-group input {
    padding: 8px;
    border: 1px solid #ddd;
    border-radius: 4px;
}

.btn-secondary {
    background: #6c757d;
    color: white;
    border: none;
    padding: 8px 16px;
    border-radius: 4px;
    cursor: pointer;
}

.btn-secondary:hover {
    background: #5a6268;
}

.data-table {
    width: 100%;
    border-collapse: collapse;
    background: white;
}

.data-table th,
.data-table td {
    padding: 12px;
    text-align: left;
    border-bottom: 1px solid #eee;
}

.data-table th {
    background: #f8f9fa;
    font-weight: bold;
}

.status-badge {
    padding: 4px 8px;
    border-radius: 4px;
    font-size: 12px;
    display: inline-block;
}

.status-draft {
    background: #ffc107;
    color: #333;
}

.status-reviewed {
    background: #28a745;
    color: white;
}

.status-processing {
    background: #17a2b8;
    color: white;
}

.status-completed {
    background: #6c757d;
    color: white;
}

.btn-sm {
    padding: 4px 8px;
    background: #007bff;
    color: white;
    text-decoration: none;
    border-radius: 4px;
    font-size: 12px;
    display: inline-block;
}

.btn-sm:hover {
    background: #0056b3;
    color: white;
}

.text-muted {
    color: #6c757d;
}

.loading,
.empty,
.error {
    text-align: center;
    padding: 40px;
    color: #666;
}

.error {
    color: #dc3545;
}

#loading-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.5);
    z-index: 9999;
    display: flex;
    justify-content: center;
    align-items: center;
}

.spinner {
    border: 4px solid #f3f3f3;
    border-top: 4px solid #007bff;
    border-radius: 50%;
    width: 40px;
    height: 40px;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}
</style>
{% endblock %}
