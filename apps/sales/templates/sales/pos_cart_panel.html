<div class="w-full md:w-96 bg-white border-l border-gray-200 flex flex-col shadow-xl overflow-hidden h-full min-w-0">

    <!-- =========================
         HEADER
    ========================== -->
    <div class="p-5 border-b border-gray-200 bg-gradient-to-r from-green-50 to-green-100 shrink-0">

        <h2 class="text-xl font-bold text-gray-900 flex items-center">
            <i class="fas fa-shopping-cart mr-3 text-green-600"></i>
            Current Sale
        </h2>

        <p class="text-sm text-gray-600 mt-1" id="cart-count">
            0 items in cart
        </p>

    </div>

    <!-- =========================
         CART ITEMS (SCROLL AREA)
    ========================== -->
    <div class="flex-1 overflow-y-auto p-4 space-y-3 min-w-0" id="cart-items">

        <!-- EMPTY STATE -->
        <div id="empty-cart-message" class="text-center py-12">

            <i class="fas fa-shopping-cart text-5xl text-gray-300 mb-4"></i>

            <h3 class="text-lg font-semibold text-gray-900 mb-2">
                Your cart is empty
            </h3>

            <p class="text-gray-500">
                Add products to get started
            </p>

        </div>

    </div>

    <!-- =========================
         FOOTER (TOTALS + ACTIONS)
    ========================== -->
    <div class="border-t border-gray-200 p-4 bg-gray-50 shrink-0">

        <!-- SUBTOTAL -->
        <div class="flex justify-between text-sm">
            <span class="text-gray-600">Subtotal</span>
            <span id="cart-subtotal" class="font-medium whitespace-nowrap">$0.00</span>
        </div>

        <!-- TAX -->
        <div class="flex justify-between text-sm">
            <span class="text-gray-600">Tax (0%)</span>
            <span id="cart-tax" class="font-medium whitespace-nowrap">$0.00</span>
        </div>

        <!-- TOTAL -->
        <div class="flex justify-between text-lg font-bold border-t border-gray-200 pt-3 mt-2">

            <span class="text-gray-900">
                Total
            </span>

            <span id="cart-total"
                  class="text-green-600 whitespace-nowrap">
                $0.00
            </span>

        </div>

        <!-- ACTION BUTTONS -->
        <div class="space-y-3 pt-4">

            <button id="clear-cart"
                    class="w-full bg-gray-500 hover:bg-gray-600 text-white py-3 rounded-lg font-semibold transition">

                <i class="fas fa-trash mr-2"></i>
                Clear Cart

            </button>

            <button id="checkout-btn"
                    class="w-full bg-green-600 hover:bg-green-700 text-white py-3 rounded-lg font-semibold disabled:opacity-50 disabled:cursor-not-allowed transition"
                    disabled>

                <i class="fas fa-credit-card mr-2"></i>
                Process Payment

            </button>

        </div>

    </div>

</div>
