<div class="w-full md:w-96 bg-white border-l border-gray-200 flex flex-col shadow-xl rounded-r-lg overflow-hidden">
    <!-- Cart Header (fixed) -->
    <div class="p-6 border-b border-gray-200 bg-gradient-to-r from-green-50 to-green-100 flex-shrink-0">
        <h2 class="text-xl font-bold text-gray-900 flex items-center">
            <i class="fas fa-shopping-cart mr-3 text-green-600"></i>
            Current Sale
        </h2>
        <p class="text-sm text-gray-600 mt-1" id="cart-count">0 items in cart</p>
    </div>

    <!-- Cart Items (scrollable) -->
    <div class="flex-1 overflow-y-auto p-6 space-y-4 max-h-[calc(100vh-320px)]" id="cart-items">
        <div id="empty-cart-message" class="text-center py-12">
            <i class="fas fa-shopping-cart text-5xl text-gray-300 mb-4"></i>
            <h3 class="text-lg font-semibold text-gray-900 mb-2">Your cart is empty</h3>
            <p class="text-gray-500">Add products to get started</p>
        </div>
        <!-- Example cart item template for dynamic JS cloning -->
        <!--
        <div class="flex justify-between items-center p-3 bg-gray-50 rounded-lg shadow-sm hover:shadow-md transition">
            <div class="flex items-center space-x-3">
                <img src="PRODUCT_IMAGE_URL" alt="Product" class="w-12 h-12 rounded object-cover">
                <div class="min-w-0">
                    <p class="font-medium text-gray-900 truncate">Product Name That Might Be Long</p>
                    <p class="text-sm text-gray-500">$UNIT_PRICE x QUANTITY</p>
                </div>
            </div>
            <div class="text-right font-medium text-gray-900">$TOTAL_PRICE</div>
        </div>
        -->
    </div>

    <!-- Cart Summary & Actions (fixed footer) -->
    <div class="border-t border-gray-200 p-6 bg-gray-50 flex-shrink-0">
        <div class="flex justify-between text-sm">
            <span class="text-gray-600">Subtotal</span>
            <span id="cart-subtotal" class="font-medium">$0.00</span>
        </div>

        <div class="flex justify-between text-sm">
            <span class="text-gray-600">Tax (0%)</span>
            <span id="cart-tax" class="font-medium">$0.00</span>
        </div>

        <div class="flex justify-between text-lg font-bold border-t border-gray-200 pt-3">
            <span class="text-gray-900">Total</span>
            <span id="cart-total" class="text-green-600">$0.00</span>
        </div>

        <div class="space-y-3 pt-4">
            <button id="clear-cart"
                    class="w-full bg-gray-500 hover:bg-gray-600 text-white py-4 px-4 rounded-lg transition duration-200 font-semibold flex items-center justify-center focus:outline-none focus:ring-2 focus:ring-gray-400 focus:ring-opacity-50">
                <i class="fas fa-trash mr-2"></i>Clear Cart
            </button>

            <button id="checkout-btn"
                    class="w-full bg-green-600 hover:bg-green-700 text-white py-4 px-4 rounded-lg transition duration-200 font-semibold disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center focus:outline-none focus:ring-2 focus:ring-green-400 focus:ring-opacity-50"
                    disabled>
                <i class="fas fa-credit-card mr-2"></i>Process Payment
            </button>
        </div>
    </div>
</div>
