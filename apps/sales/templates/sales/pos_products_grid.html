<!-- templates/sales/pos_products_grid.html -->
<div class="flex-1 overflow-y-auto p-4 bg-gray-50">
    <div id="products-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4">
        <div id="loading-products" class="col-span-full text-center py-12">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-green-600 mx-auto"></div>
            <p class="mt-4 text-gray-600">Loading products...</p>
        </div>
    </div>

    <!-- Error State -->
    <div id="error-products" class="hidden col-span-full text-center py-12">
        <i class="fas fa-exclamation-triangle text-4xl text-red-400 mb-3"></i>
        <h3 class="text-lg font-medium text-gray-900 mb-2">Failed to load products</h3>
        <p class="text-gray-500 mb-4">Please check your connection and try again</p>
        <button id="retry-load" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg">
            <i class="fas fa-redo mr-2"></i>Retry
        </button>
    </div>
</div>
