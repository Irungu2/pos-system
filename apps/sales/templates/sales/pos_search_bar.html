<!-- templates/sales/pos_search_bar.html -->
<div class="bg-white border-b border-gray-200 p-4 shadow-sm">
    <div class="flex flex-col sm:flex-row gap-4">
        <!-- Search -->
        <div class="flex-1 relative">
            <i class="fas fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
            <input 
                type="text" 
                id="product-search" 
                placeholder="Search products by name, SKU, or barcode..."
                class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500 transition duration-200"
            >
        </div>
        
        <!-- Category Filter -->
        <div class="w-full sm:w-64">
            <select id="category-filter" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500 focus:border-green-500 transition duration-200">
                <option value="">All Categories</option>
            </select>
        </div>
        
        <!-- Clear Filters -->
        <button id="clear-filters" class="px-6 py-3 border border-gray-300 rounded-lg hover:bg-gray-50 transition duration-200 flex items-center">
            <i class="fas fa-times mr-2"></i>Clear
        </button>

        <!-- Refresh Products -->
        <button id="refresh-products" class="px-6 py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-lg transition duration-200 flex items-center">
            <i class="fas fa-sync-alt mr-2"></i>Refresh
        </button>
    </div>
</div>
